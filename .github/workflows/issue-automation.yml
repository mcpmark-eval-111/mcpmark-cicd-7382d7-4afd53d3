name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

concurrency:
  group: issue-automation-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  issue-triage:
    name: Issue triage
    runs-on: ubuntu-latest
    outputs:
      is_epic: ${{ steps.triage.outputs.is_epic }}
      priority_label: ${{ steps.triage.outputs.priority_label }}
      is_subtask: ${{ steps.triage.outputs.is_subtask }}
    steps:
      - name: Ensure labels and triage issue
        id: triage
        uses: actions/github-script@v7
        with:
          script: |
            const octokit = github;
            const { owner, repo } = context.repo;
            const issueNumber = context.payload.issue.number;
            const issue = context.payload.issue;
            const title = issue.title || '';
            const body = issue.body || '';
            const titleLower = title.toLowerCase();
            const combinedText = `${title}\n${body}`.toLowerCase();
            const isSubtask = title.trim().toLowerCase().startsWith('[subtask]');

            const managedLabels = [
              { name: 'bug', color: 'd73a4a', description: "Something isn't working" },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '6f42c1', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'fbca04', description: 'Maintenance and housekeeping tasks' },
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'd93f0b', description: 'High priority issue' },
              { name: 'priority-medium', color: 'fbca04', description: 'Medium priority issue' },
              { name: 'priority-low', color: '0e8a16', description: 'Low priority issue' },
              { name: 'needs-triage', color: 'ededed', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: 'c5def5', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '5319e7', description: 'Issue created by first-time contributor' }
            ];

            async function ensureLabel(label) {
              try {
                await octokit.rest.issues.updateLabel({
                  owner,
                  repo,
                  name: label.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description
                });
              } catch (error) {
                if (error.status === 404) {
                  await octokit.rest.issues.createLabel({
                    owner,
                    repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                } else {
                  core.warning(`Could not ensure label ${label.name}: ${error.message}`);
                }
              }
            }

            for (const label of managedLabels) {
              await ensureLabel(label);
            }

            const { data: currentIssue } = await octokit.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber
            });
            const existingLabels = new Set(
              currentIssue.labels.map((label) => (typeof label === 'string' ? label : label.name))
            );

            const labelsToAdd = [];
            if (!isSubtask) {
              if (titleLower.includes('bug')) {
                labelsToAdd.push('bug');
              }
              if (titleLower.includes('epic')) {
                labelsToAdd.push('epic');
              }
              if (titleLower.includes('maintenance')) {
                labelsToAdd.push('maintenance');
              }

              const priorityRules = [
                { label: 'priority-critical', keywords: ['critical', 'urgent', 'production', 'outage'] },
                { label: 'priority-high', keywords: ['important', 'high', 'blocking'] },
                { label: 'priority-medium', keywords: ['medium', 'normal'] },
                { label: 'priority-low', keywords: ['low', 'nice-to-have', 'minor'] }
              ];
              let priorityLabel = 'priority-medium';
              for (const rule of priorityRules) {
                if (rule.keywords.some((keyword) => combinedText.includes(keyword))) {
                  priorityLabel = rule.label;
                  break;
                }
              }
              labelsToAdd.push(priorityLabel);

              if (context.payload.action === 'opened' && !existingLabels.has('needs-review')) {
                labelsToAdd.push('needs-triage');
              }

              const uniqueLabels = [...new Set(labelsToAdd)].filter((label) => !existingLabels.has(label));
              if (uniqueLabels.length > 0) {
                await octokit.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: uniqueLabels
                });
              }

              core.setOutput('priority_label', priorityLabel);
              core.setOutput('is_epic', titleLower.includes('epic') ? 'true' : 'false');
            } else {
              core.info('Skipping normal triage for generated sub-task issue.');
              core.setOutput('priority_label', '');
              core.setOutput('is_epic', 'false');
            }

            core.setOutput('is_subtask', isSubtask ? 'true' : 'false');

  task-breakdown:
    name: Epic task breakdown
    runs-on: ubuntu-latest
    needs: issue-triage
    if: needs.issue-triage.outputs.is_epic == 'true'
    steps:
      - name: Create and link epic sub-issues
        uses: actions/github-script@v7
        with:
          script: |
            const octokit = github;
            const { owner, repo } = context.repo;
            const parentNumber = context.payload.issue.number;
            const originalTitle = context.payload.issue.title || '';
            const taskNames = [
              'Requirements Analysis',
              'Design and Architecture',
              'Implementation',
              'Testing and Documentation'
            ];

            const { data: parentIssue } = await octokit.rest.issues.get({
              owner,
              repo,
              issue_number: parentNumber
            });

            const existingIssues = await octokit.paginate(octokit.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'all',
              per_page: 100
            });

            const subIssues = [];
            for (let index = 0; index < taskNames.length; index += 1) {
              const taskNumber = index + 1;
              const taskName = taskNames[index];
              const subIssueTitle = `[SUBTASK] ${originalTitle} - Task ${taskNumber}: ${taskName}`;
              const existingSubIssue = existingIssues.find(
                (candidate) => !candidate.pull_request && candidate.title === subIssueTitle
              );

              if (existingSubIssue) {
                subIssues.push(existingSubIssue);
                continue;
              }

              const subIssueBody = [
                `This sub-task is part of the epic issue #${parentNumber}.`,
                '',
                `Related to #${parentNumber}`,
                '',
                `Task ${taskNumber}: ${taskName}`,
                '',
                'Please complete this work as part of the parent epic checklist.'
              ].join('\n');

              const { data: createdSubIssue } = await octokit.rest.issues.create({
                owner,
                repo,
                title: subIssueTitle,
                body: subIssueBody,
                labels: ['enhancement', 'needs-review']
              });
              subIssues.push(createdSubIssue);
            }

            subIssues.sort((left, right) => {
              const leftMatch = left.title.match(/ - Task (\d+):/);
              const rightMatch = right.title.match(/ - Task (\d+):/);
              return Number(leftMatch?.[1] || 0) - Number(rightMatch?.[1] || 0);
            });

            const checklist = [
              '## Epic Tasks',
              ...subIssues.map((subIssue, index) => {
                const taskName = taskNames[index] || subIssue.title;
                return `- [ ] #${subIssue.number} - ${taskName}`;
              })
            ].join('\n');

            const parentBody = parentIssue.body || '';
            const bodyWithoutOldChecklist = parentBody.replace(/\n*## Epic Tasks[\s\S]*$/m, '').trimEnd();
            const updatedBody = bodyWithoutOldChecklist
              ? `${bodyWithoutOldChecklist}\n\n${checklist}`
              : checklist;

            await octokit.rest.issues.update({
              owner,
              repo,
              issue_number: parentNumber,
              body: updatedBody
            });

  auto-response:
    name: Auto response and status management
    runs-on: ubuntu-latest
    needs: issue-triage
    if: needs.issue-triage.outputs.is_subtask != 'true'
    steps:
      - name: Respond, welcome contributors, and update status
        uses: actions/github-script@v7
        with:
          script: |
            const octokit = github;
            const { owner, repo } = context.repo;
            const issueNumber = context.payload.issue.number;
            const issueAuthor = context.payload.issue.user.login;

            const { data: currentIssue } = await octokit.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber
            });
            const labelNames = new Set(
              currentIssue.labels.map((label) => (typeof label === 'string' ? label : label.name))
            );

            async function isFirstIssueInRepository(author) {
              try {
                const authoredIssues = await octokit.paginate(octokit.rest.issues.listForRepo, {
                  owner,
                  repo,
                  state: 'all',
                  creator: author,
                  per_page: 100
                });
                return !authoredIssues.some(
                  (candidate) => !candidate.pull_request && candidate.number !== issueNumber
                );
              } catch (error) {
                core.warning(`Could not determine first-time contributor status: ${error.message}`);
                return false;
              }
            }

            async function ensureMilestone(title) {
              try {
                const milestones = await octokit.paginate(octokit.rest.issues.listMilestones, {
                  owner,
                  repo,
                  state: 'all',
                  per_page: 100
                });
                const existingMilestone = milestones.find((milestone) => milestone.title === title);
                if (existingMilestone) {
                  return existingMilestone;
                }
                const { data: createdMilestone } = await octokit.rest.issues.createMilestone({
                  owner,
                  repo,
                  title,
                  description: 'Initial release milestone for high-priority work'
                });
                return createdMilestone;
              } catch (error) {
                core.warning(`Could not ensure milestone ${title}: ${error.message}`);
                return null;
              }
            }

            const commentSections = ['<!-- issue-management-auto-response -->'];
            const firstIssue = await isFirstIssueInRepository(issueAuthor);
            if (firstIssue) {
              if (!labelNames.has('first-time-contributor')) {
                await octokit.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: ['first-time-contributor']
                });
                labelNames.add('first-time-contributor');
              }
              commentSections.push(
                `Welcome @${issueAuthor}! Thanks for opening your first issue in this repository. A maintainer will review it soon.`
              );
            }

            if (labelNames.has('bug')) {
              commentSections.push(
                '### Bug Report Guidelines\nThanks for reporting a bug. Please make sure the issue includes clear reproduction steps, expected behavior, actual behavior, environment details, and any relevant logs or screenshots.'
              );
            }
            if (labelNames.has('epic')) {
              commentSections.push(
                '### Feature Request Process\nThanks for proposing an epic. We will validate scope, review requirements, break down implementation tasks, and track progress through linked sub-issues.'
              );
            }
            if (labelNames.has('maintenance')) {
              commentSections.push(
                '### Maintenance Guidelines\nThanks for identifying maintenance work. Please include the cleanup scope, affected modules, risk level, and any validation steps needed after the change.'
              );
            }

            const comments = await octokit.paginate(octokit.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            });
            const alreadyResponded = comments.some((comment) =>
              (comment.body || '').includes('<!-- issue-management-auto-response -->')
            );

            if (!alreadyResponded && commentSections.length > 1) {
              await octokit.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: commentSections.join('\n\n')
              });
            }

            if (labelNames.has('priority-high') || labelNames.has('priority-critical')) {
              const milestone = await ensureMilestone('v1.0.0');
              if (milestone) {
                await octokit.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  milestone: milestone.number
                });
              }
            }

            if (!labelNames.has('needs-review')) {
              await octokit.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ['needs-review']
              });
              labelNames.add('needs-review');
            }

            if (labelNames.has('needs-triage')) {
              try {
                await octokit.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name: 'needs-triage'
                });
              } catch (error) {
                if (error.status !== 404) {
                  core.warning(`Could not remove needs-triage label: ${error.message}`);
                }
              }
            }
